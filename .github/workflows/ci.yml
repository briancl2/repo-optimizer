name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run deterministic gate
        env:
          CLOSURE_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          CLOSURE_TRIGGER: github_actions
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: make check

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check out repo-agent-core schemas
        uses: actions/checkout@v4
        with:
          repository: briancl2/repo-agent-core
          path: repo-agent-core

      - name: Run deterministic test suite
        env:
          CLOSURE_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          CLOSURE_TRIGGER: github_actions
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          REPO_AGENT_CORE: ${{ github.workspace }}/repo-agent-core
        run: make test
